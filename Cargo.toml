[package]
name = "solitext"
version = "0.4.0"
edition = "2024"
default-run = "local"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
rand = "0.9.0"
strum = { version = "0.27.1", features = ["derive"] }
termion = "4.0.5"
test-case = "3.3.1"

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
